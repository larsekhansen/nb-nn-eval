<!doctype html>
<html lang="nb">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>nb-nn-eval · Resultat</title>
  <link rel="stylesheet" href="/ui/style.css" />
</head>
<body>
  <header class="topbar">
    <h1>Tidlegare resultat</h1>
    <nav>
      <a href="/">Playground</a>
      <a href="/eval">BLEU-evaluering</a>
      <a href="/results" class="active">Tidlegare resultat</a>
    </nav>
  </header>

  <main class="wrap">
    <section class="card">
      <h2>Lagra evalueringar</h2>
      <p class="muted">Klikk på ei evaluering for å sjå detaljerte resultat. Du kan samanlikne fleire køyringar side om side.</p>
      <div id="results-list">Lastar…</div>
    </section>

    <section id="compare-section" class="card" hidden>
      <h2>Samanlikning</h2>
      <p class="muted">Vel to eller fleire resultat ovanfor for å samanlikne.</p>
      <div id="compare-table"></div>
    </section>

    <section id="detail-section" class="card" hidden>
      <h2 id="detail-title">Detaljar</h2>
      <div id="detail-content"></div>
    </section>
  </main>

  <script src="/ui/results.js"></script>
</body>
</html>
